
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TruckMarket</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f1f5f9;
}

header{
background:#111827;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:260px;
object-fit:cover;
}

.card-body{
padding:20px;
}

.price{
font-size:30px;
color:#16a34a;
font-weight:bold;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:12px;
margin-top:30px;
}

.gallery img{
width:100%;
border-radius:8px;
}

button{
margin-top:15px;
padding:12px 18px;
border:none;
background:#2563eb;
color:white;
border-radius:6px;
font-size:15px;
cursor:pointer;
}

footer{
background:#111827;
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}
</style>

</head>

<body>

<header>
<h1>TruckMarket</h1>
<p>Commercial Truck Listings</p>
</header>

<div class="container">

<div class="card">
<img src="images/truck1.jpg">
<div class="card-body">

<h2>Mercedes-Benz Arocs 8x4 Tipper Grab Crane</h2>
<div class="price">£23,000</div>

<p>
Heavy duty tipper truck with grab crane. Ready for construction,
aggregates and commercial work.
</p>

<button onclick="alert('Contact seller for more details')">
Contact Seller
</button>

</div>
</div>

<h2>Truck Photos</h2>

<div class="gallery">
<img src="images/truck1.jpg"><img src="images/truck2.jpg"><img src="images/truck3.jpg">
</div>

</div>

<footer>
TruckMarket Listing
</footer>

</body>
</html>
